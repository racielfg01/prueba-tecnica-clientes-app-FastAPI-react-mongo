services:
  - type: web
    name: innovasoft-app
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DATABASE_NAME
        value: innovasoft_db
      - key: PORT
        value: 10000
      - key: PYTHONUNBUFFERED
        value: "1"